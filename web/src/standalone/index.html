<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eigenvue — Algorithm Visualization</title>
    <!-- Inline empty icon: avoids a spurious /favicon.ico request to the local server. -->
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#visualization">Skip to visualization</a>

    <div id="app">
      <header id="header">
        <h1 id="algo-name">Loading…</h1>
        <p id="algo-description"></p>
      </header>

      <main id="main-content">
        <!-- Visualization column -->
        <section id="viz-column" aria-label="Visualization">
          <div id="canvas-host">
            <canvas id="viz-canvas" role="img" aria-label="Algorithm visualization"></canvas>
            <div id="layout-missing" class="overlay-message" hidden></div>
          </div>

          <div id="step-info">
            <h2 id="step-title"></h2>
            <p id="explanation-text" aria-live="polite" aria-atomic="true"></p>
          </div>

          <div id="controls" role="toolbar" aria-label="Playback controls">
            <button id="btn-first" type="button" aria-label="First step">&#8676;</button>
            <button id="btn-prev" type="button" aria-label="Previous step">&#8592;</button>
            <button id="btn-playpause" type="button" aria-label="Play" aria-pressed="false">
              &#9654;
            </button>
            <button id="btn-next" type="button" aria-label="Next step">&#8594;</button>
            <button id="btn-last" type="button" aria-label="Last step">&#8677;</button>
            <button id="btn-speed" type="button" aria-label="Playback speed">1&times;</button>
            <span id="step-counter" aria-live="polite">0 / 0</span>
          </div>

          <input
            id="progress"
            type="range"
            min="0"
            max="0"
            value="0"
            step="1"
            aria-label="Step progress"
          />

          <nav id="step-ids" aria-label="Step sequence">
            <div id="step-id-list"></div>
          </nav>
        </section>

        <!-- Side column: code + state -->
        <aside id="side-column">
          <section id="code-panel" aria-label="Source code">
            <div id="code-tabs" role="tablist" aria-label="Code language"></div>
            <ol id="code-lines" class="code-lines"></ol>
          </section>

          <section id="state-inspector" aria-label="Algorithm state">
            <h3>State</h3>
            <pre id="state-display"></pre>
          </section>
        </aside>
      </main>

      <footer id="footer">
        <span>Powered by <a href="https://eigenvue.web.app" rel="noopener">Eigenvue</a></span>
      </footer>
    </div>

    <!-- Screen-reader live status for step changes -->
    <div id="sr-status" class="sr-only" aria-live="polite" aria-atomic="true"></div>

    <script src="/static/visualizer.js"></script>
  </body>
</html>
